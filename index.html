<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forever Young Casino</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <!-- Three.js canvas fills the viewport -->
  <canvas id="game-canvas"></canvas>

  <!-- ═══ HUD overlay ═══════════════════════════════════════════════════════ -->
  <div id="hud">

    <!-- TOP BAR -->
    <div id="top-bar">
      <!-- Rank badge -->
      <div id="rank-badge">
        <span id="rank-icon">🎰</span>
        <div id="rank-info">
          <span id="rank-name">Rookie</span>
          <div id="xp-track">
            <div id="xp-fill"></div>
          </div>
          <span id="xp-label">0 / 500 XP</span>
        </div>
      </div>

      <!-- Balance -->
      <div id="balance-panel">
        <div class="panel-label">BALANCE</div>
        <div id="balance-val">$10,000</div>
      </div>

      <!-- Jackpot ticker -->
      <div id="jackpot-panel">
        <div class="panel-label">JACKPOT</div>
        <div id="jackpot-val">$10,000,000</div>
      </div>
    </div>

    <!-- BOTTOM CONTROLS -->
    <div id="bottom-bar">
      <!-- Bet control -->
      <div id="bet-control">
        <button class="icon-btn" id="bet-down">&#8722;</button>
        <div id="bet-info">
          <div class="panel-label">BET</div>
          <div id="bet-val">$100</div>
        </div>
        <button class="icon-btn" id="bet-up">&#43;</button>
      </div>

      <!-- SPIN button -->
      <button id="spin-btn">
        <span class="spin-icon">🎰</span>
        <span class="spin-label">SPIN</span>
      </button>

      <!-- Max bet -->
      <button id="max-btn">MAX BET</button>

      <!-- Daily bonus -->
      <button id="daily-btn">Daily Bonus</button>

      <!-- Sound toggle -->
      <button id="sound-btn" title="Toggle sound">🔊</button>

      <!-- Stats toggle -->
      <button id="stats-btn" title="Stats">📊</button>
    </div>

    <!-- STATS PANEL (slide-in from right) -->
    <div id="stats-panel" class="hidden">
      <h3>Your Stats</h3>
      <div class="stat-row"><span>Total Spins</span><span id="st-spins">0</span></div>
      <div class="stat-row"><span>Total Wins</span><span id="st-wins">0</span></div>
      <div class="stat-row"><span>Biggest Win</span><span id="st-biggest">$0</span></div>
      <div class="stat-row"><span>XP Earned</span><span id="st-xp">0</span></div>
      <hr />
      <h4>Rank Ladder</h4>
      <div id="rank-ladder"></div>
      <button id="stats-close">Close</button>
    </div>

    <!-- TOAST message -->
    <div id="toast"></div>

    <!-- WIN OVERLAY -->
    <div id="win-overlay">
      <div id="win-box">
        <div id="win-emoji">🏆</div>
        <div id="win-title">WINNER!</div>
        <div id="win-amount">+$0</div>
        <div id="win-xp-gain"></div>
        <button id="win-close">COLLECT</button>
      </div>
      <div id="confetti-layer"></div>
    </div>

    <!-- RANK-UP MODAL -->
    <div id="rankup-modal">
      <div id="rankup-box">
        <div id="rankup-sparkle">✨</div>
        <div id="rankup-title">RANK UP!</div>
        <div id="rankup-new"></div>
        <div id="rankup-reward"></div>
        <button id="rankup-close">CLAIM</button>
      </div>
    </div>

  </div><!-- end #hud -->

  <script type="module" src="./main.js"></script>
</body>
</html>
